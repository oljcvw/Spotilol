name: Build Any APK

on:
  push:
    branches: [ "main" ] # Keeps automatic builds
  workflow_dispatch:     # Enables the manual "Run workflow" button
    inputs:
      build_type:
        description: 'Choose the build variant to compile'
        required: true
        type: choice      
        default: 'Release'
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Determine Build Type
        run: |
          # If triggered by a push default to 'Release'
          TYPE="${{ inputs.build_type || 'Release' }}"
          # Convert to lowercase for the Android folder paths
          TYPE_LOWER=$(echo "$TYPE" | tr '[:upper:]' '[:lower:]')
          
          echo "BUILD_TYPE=$TYPE" >> $GITHUB_ENV
          echo "BUILD_TYPE_LOWER=$TYPE_LOWER" >> $GITHUB_ENV

      - name: Restore signing key
        run: |
          mkdir -p signing
          printf "%s" "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > signing/release.jks

      - name: Create keystore.properties
        run: |
          printf "storeFile=signing/release.jks\nstorePassword=%s\nkeyAlias=spotilol\nkeyPassword=%s\n" \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" > keystore.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.4.1"
        
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ env.BUILD_TYPE }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/${{ env.BUILD_TYPE_LOWER }}/app-${{ env.BUILD_TYPE_LOWER }}.apk \
             app/build/outputs/apk/${{ env.BUILD_TYPE_LOWER }}/spotilol-${{ env.BUILD_TYPE_LOWER }}-${{ github.run_number }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: spotilol-${{ env.BUILD_TYPE_LOWER }}-apk
          path: app/build/outputs/apk/${{ env.BUILD_TYPE_LOWER }}/*.apk
          overwrite: true
          retention-days: 7
          archive: false
